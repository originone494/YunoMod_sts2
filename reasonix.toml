orkshop index ===\"; Get-ChildItem \"D:\\steam\\steamapps\\workshop\\content\\2868840\" -ErrorAction SilentlyContinue)", "Bash(Write-Host \"=== Looking for sts2.dll anywhere under steam ===\"; Get-ChildItem \"D:\\steam\\steamapps\\common\\Slay the Spire 2\" -ErrorAction SilentlyContinue | Select-Object Name; Write-Host \"=== Any sts2.dll ===\"; Get-ChildItem \"D:\\steam\\steamapps\" -Recurse -Filter \"sts2.dll\" -ErrorAction SilentlyContinue | Select-Object FullName; Write-Host \"=== Any 0Harmony.dll ===\"; Get-ChildItem \"D:\\steam\\steamapps\" -Recurse -Filter \"0Harmony.dll\" -ErrorAction SilentlyContinue | Select-Object FullName)", "Bash(Get-ChildItem \"D:\\steam\\steamapps\\common\" -ErrorAction SilentlyContinue | Select-Object Name)", "Bash(Get-ChildItem \"D:\\steam\\steamapps\\common\\Slay the Spire 2\\data_sts2_windows_x86_64\" -ErrorAction SilentlyContinue | Select-Object Name, Length)", "Bash(dotnet build 2>&1 | Select-String -Pattern \"^.*error CS\" | Select-Object -First 30)", "Bash(# Check if the DLL has the expected types\n$path = \"D:\\steam\\steamapps\\workshop\\content\\2868840\\3747602295\\STS2-RitsuLib.dll\"\nAdd-Type -AssemblyName System.Reflection\n$asm = [System.Reflection.Assembly]::LoadFrom($path)\n$asm.GetExportedTypes() | ForEach-Object { $_.FullName } | Sort-Object)", "Bash(# Try to use the .NET SDK to inspect the DLL\n$proj = @'\n<Project Sdk=\"Microsoft.NET.Sdk\">\n  <PropertyGroup><TargetFramework>net9.0</TargetFramework></PropertyGroup>\n  <ItemGroup>\n    <Reference Include=\"STS2-RitsuLib\" HintPath=\"D:\\steam\\steamapps\\workshop\\content\\2868840\\3747602295\\STS2-RitsuLib.dll\" />\n    <Reference Include=\"sts2\" HintPath=\"D:\\steam\\steamapps\\common\\Slay the Spire 2\\data_sts2_windows_x86_64\\sts2.dll\" />\n    <Reference Include=\"0Harmony\" HintPath=\"D:\\steam\\steamapps\\common\\Slay the Spire 2\\data_sts2_windows_x86_64\\0Harmony.dll\" />\n  </ItemGroup>\n</Project>\n'@\n$proj | Set-Content \"D:\\myProgram\\GodotProgram\